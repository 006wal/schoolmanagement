<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Saisir une Note - EduAdmin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .grade-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-top: 40px;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border: none;
        }
        .form-label { font-weight: 600; color: #4a5568; }
        .input-group-text { background-color: #edf2f7; border: none; }
        .form-control, .form-select {
            border: 2px solid #edf2f7;
            padding: 12px;
            border-radius: 10px;
        }
        .form-control:focus { border-color: #667eea; box-shadow: none; }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 14px;
            font-weight: bold;
            border-radius: 10px;
            transition: transform 0.2s;
        }
        .btn-submit:hover { transform: translateY(-2px); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="grade-card card">
                <div class="card-header text-center">
                    <h3 class="mb-0"><i class="fas fa-pen-nib me-2"></i> Carnet de Notes</h3>
                    <p class="mb-0 opacity-75">Enregistrement d'une nouvelle évaluation</p>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/teacher/save-grade}" th:object="${grade}" method="post">
                        
                        <div class="mb-4">
                            <label class="form-label">Sélectionner l'élève</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user-graduate"></i></span>
                                <select th:field="*{student.id}" class="form-select" required>
                                    <option value="" disabled selected>Choisir un étudiant...</option>
                                    <option th:each="s : ${students}" 
                                            th:value="${s.id}" 
                                            th:text="${s.name}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-7 mb-4">
                                <label class="form-label">Matière</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-book"></i></span>
                                    <input type="text" th:field="*{subject}" class="form-control" placeholder="Ex: Mathématiques" required>
                                </div>
                            </div>
                            <div class="col-md-5 mb-4">
                                <label class="form-label">Note / 20</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-star"></i></span>
                                    <input type="number" step="0.25" min="0" max="20" th:field="*{score}" class="form-control" placeholder="0.00" required>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Commentaires / Observations</label>
                            <textarea th:field="*{comments}" class="form-control" rows="3" placeholder="Facultatif : remarques sur l'élève..."></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-submit text-white">
                                <i class="fas fa-check-circle me-2"></i> Valider la note
                            </button>
                            <a th:href="@{/teacher/dashboard}" class="btn btn-light">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
