<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inscrire un Étudiant | EduAdmin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; padding: 50px; }
        .form-container { background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2 class="mb-4 text-primary">Nouvelle Inscription</h2>
        
        <form th:action="@{/admin/save-student}" th:object="${user}" method="post">
            <div class="mb-3">
                <label class="form-label">Nom complet</label>
                <input type="text" th:field="*{name}" class="form-control" placeholder="Ex: Jean Dupont" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Adresse Email</label>
                <input type="email" th:field="*{email}" class="form-control" placeholder="etudiant@school.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Mot de passe provisoire</label>
                <input type="password" th:field="*{password}" class="form-control" required>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <a href="/admin/dashboard" class="btn btn-light">Annuler</a>
                <button type="submit" class="btn btn-primary px-4">Enregistrer l'étudiant</button>
            </div>
        </form>
    </div>

</body>
</html>
