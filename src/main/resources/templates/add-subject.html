<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ajouter Matière | EduAdmin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar-width: 250px; --primary-blue: #1e293b; }
        body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; background: var(--primary-blue); color: white; }
        .main-content { margin-left: var(--sidebar-width); padding: 30px; }
        .nav-link { color: #94a3b8; padding: 12px 20px; border-radius: 8px; margin: 4px 15px; }
        .nav-link:hover, .nav-link.active { background: #334155; color: white; }
    </style>
</head>
<body>
    <div class="sidebar d-flex flex-column">
        <div class="p-4 text-center">
            <h3 class="fw-bold text-info">EduAdmin</h3>
        </div>
        <nav class="nav flex-column mt-2">
            <a class="nav-link" th:href="@{/admin/dashboard}"><i class="fas fa-home me-2"></i> Dashboard</a>
            <a class="nav-link" th:href="@{/admin/students}"><i class="fas fa-user-graduate me-2"></i> Étudiants</a>
            <a class="nav-link" th:href="@{/admin/teachers}"><i class="fas fa-chalkboard-teacher me-2"></i> Professeurs</a>
            <a class="nav-link active" th:href="@{/admin/subjects}"><i class="fas fa-book me-2"></i> Matières</a>
        </nav>
        <div class="mt-auto p-4">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-danger w-100">Déconnexion</button>
            </form>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Ajouter une Matière</h2>
            <a th:href="@{/admin/subjects}" class="btn btn-secondary">
                <i class="fas fa-arrow-left me-2"></i>Retour
            </a>
        </div>

        <div class="card border-0 shadow-sm rounded-4" style="max-width: 600px;">
            <div class="card-body p-4">
                <form th:action="@{/admin/save-subject}" th:object="${subject}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nom de la matière</label>
                        <input type="text" class="form-control" th:field="*{name}" placeholder="Ex: Mathématiques" required/>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Description</label>
                        <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Description de la matière..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-warning text-white w-100">
                        <i class="fas fa-save me-2"></i>Sauvegarder
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
