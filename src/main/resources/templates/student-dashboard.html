<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mon Bulletin - EduAdmin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .student-header { background: #2c3e50; color: white; padding: 40px 0; margin-bottom: 30px; border-bottom: 5px solid #3498db; }
        .grade-card { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 25px; }
        .average-circle { 
            width: 120px; height: 120px; border-radius: 50%; border: 8px solid #3498db;
            display: flex; align-items: center; justify-content: center; font-size: 1.8em; font-weight: bold; margin: 0 auto;
        }
    </style>
</head>
<body>

<div class="student-header text-center">
    <div class="container">
        <h1><i class="fas fa-user-graduate me-3"></i> Bulletin Scolaire</h1>
        <p class="lead">Bienvenue, <span th:text="${student.name}" class="fw-bold">Nom Étudiant</span></p>
    </div>
</div>

<div class="container">
    <div class="row">
        <div class="col-md-4 text-center mb-4">
            <div class="grade-card h-100">
                <h5 class="text-muted mb-4">Moyenne Générale</h5>
                <div class="average-circle text-primary" th:text="${average}">0.0</div>
                <p class="mt-4 text-muted small">Sur une base de 20 points</p>
                <hr>
                <div class="d-grid mt-3">
                    <a th:href="@{/logout}" class="btn btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="grade-card">
                <h5 class="mb-4"><i class="fas fa-list-check me-2 text-primary"></i> Détail des Notes</h5>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Matière</th>
                                <th>Note / 20</th>
                                <th>Professeur</th>
                                <th>Commentaires</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="g : ${grades}">
                                <td th:text="${g.subject}" class="fw-bold">Mathématiques</td>
                                <td>
                                    <span th:text="${g.score}" 
                                          th:class="${g.score >= 10 ? 'badge bg-success' : 'badge bg-danger'}">15</span>
                                </td>
                                <td th:text="${g.teacher.name}">M. Jean</td>
                                <td th:text="${g.comments}" class="text-muted font-italic small">Travail sérieux...</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(grades)}">
                                <td colspan="4" class="text-center text-muted">Aucune note n'a été publiée pour le moment.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
