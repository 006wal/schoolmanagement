<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Matières | EduAdmin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar-width: 250px; --primary-blue: #1e293b; }
        body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; background: var(--primary-blue); color: white; }
        .main-content { margin-left: var(--sidebar-width); padding: 30px; }
        .nav-link { color: #94a3b8; padding: 12px 20px; border-radius: 8px; margin: 4px 15px; }
        .nav-link:hover, .nav-link.active { background: #334155; color: white; }
    </style>
</head>
<body>
    <div class="sidebar d-flex flex-column">
        <div class="p-4 text-center">
            <h3 class="fw-bold text-info">EduAdmin</h3>
        </div>
        <nav class="nav flex-column mt-2">
            <a class="nav-link" th:href="@{/admin/dashboard}"><i class="fas fa-home me-2"></i> Dashboard</a>
            <a class="nav-link" th:href="@{/admin/students}"><i class="fas fa-user-graduate me-2"></i> Étudiants</a>
            <a class="nav-link" th:href="@{/admin/teachers}"><i class="fas fa-chalkboard-teacher me-2"></i> Professeurs</a>
            <a class="nav-link active" th:href="@{/admin/subjects}"><i class="fas fa-book me-2"></i> Matières</a>
        </nav>
        <div class="mt-auto p-4">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-danger w-100">Déconnexion</button>
            </form>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Liste des Matières</h2>
            <a th:href="@{/admin/add-subject}" class="btn btn-warning text-white">
                <i class="fas fa-plus me-2"></i>Ajouter une matière
            </a>
        </div>

        <div th:if="${param.success}" class="alert alert-success">Matière sauvegardée avec succès !</div>
        <div th:if="${param.deletedSuccess}" class="alert alert-info">Matière supprimée avec succès !</div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Nom</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="subject : ${subjects}">
                            <td th:text="${subject.id}"></td>
                            <td th:text="${subject.name}"></td>
                            <td th:text="${subject.description}"></td>
                            <td>
                                <a th:href="@{/admin/subjects/delete/{id}(id=${subject.id})}" 
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('Supprimer cette matière ?')">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(subjects)}">
                            <td colspan="4" class="text-center text-muted">Aucune matière trouvée</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
