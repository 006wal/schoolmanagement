<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | EduSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            color: white;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 10px;
            color: white;
            padding: 12px;
            margin-bottom: 20px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .form-control::placeholder { color: rgba(255, 255, 255, 0.7); }

        .btn-login {
            background: #2ecc71;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }

        .school-logo {
            font-size: 3rem;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-container shadow">
    <div class="school-logo">
        <i class="fas fa-graduation-cap"></i>
    </div>
    <h3 class="text-center mb-4 fw-bold">EduSmart Login</h3>

    <div th:if="${param.error}" class="alert alert-danger py-2 small border-0 text-center" style="background: rgba(231, 76, 60, 0.8); color: white;">
        Email ou mot de passe incorrect.
    </div>

    <div th:if="${param.logout}" class="alert alert-info py-2 small border-0 text-center" style="background: rgba(52, 152, 219, 0.8); color: white;">
        Vous avez été déconnecté.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label small">Identifiant (Email)</label>
            <div class="input-group">
                <span class="input-group-text bg-transparent border-0 text-white"><i class="fas fa-user"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Entrez votre email" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label small">Mot de passe</label>
            <div class="input-group">
                <span class="input-group-text bg-transparent border-0 text-white"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
        </div>

        <div class="d-flex justify-content-between mb-4 small">
            <div class="form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label" for="rememberMe">Se souvenir</label>
            </div>
            <a href="#" class="text-white text-decoration-none">Oublié ?</a>
        </div>

        <button type="submit" class="btn btn-login text-white">Se connecter</button>
    </form>

    <div class="text-center mt-4 small">
        <p class="mb-0 opacity-75">Problème d'accès ?</p>
        <a href="mailto:admin@ecole.com" class="text-white fw-bold">Contacter l'administration</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
