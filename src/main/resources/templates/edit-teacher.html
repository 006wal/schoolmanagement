<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifier le Professeur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-top: 50px;
        }
        .card-header {
            background-color: #2c3e50;
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
        }
        .form-control:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header text-center">
                    <h4><i class="fas fa-edit"></i> Modifier le Profil</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/save-teacher}" th:object="${user}" method="post">
                        
                        <input type="hidden" th:field="*{id}" />
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nom Complet</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="Ex: Jean Marc" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email Professionnel</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="nom@ecole.com" required>
                        </div>
                        
                        <input type="hidden" th:field="*{password}" />
                        <input type="hidden" th:field="*{enabled}" />

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">Mettre à jour</button>
                            <a th:href="@{/admin/teachers}" class="btn btn-light text-muted">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
